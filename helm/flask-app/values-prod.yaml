# Production environment overrides
replicaCount: 3

image:
  tag: "v2.0.0"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15

env:
  FLASK_ENV: "production"
  LOG_LEVEL: "WARNING"

podDisruptionBudget:
  enabled: true
  minAvailable: 2
