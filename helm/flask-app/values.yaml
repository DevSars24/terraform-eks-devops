# ╔══════════════════════════════════════════════════════════════╗
# ║  Default Helm Values                                        ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝

# ─── Replicas ─────────────────────────────────────────────────
replicaCount: 2

# ─── Image ────────────────────────────────────────────────────
image:
  repository: flask-eks-app
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ─── Service Account ─────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ─── Pod Security ────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Service ─────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 5000

# ─── Ingress ─────────────────────────────────────────────────
ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ─── Resources ───────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ─── Autoscaling ─────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ─── Probes ──────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 10

# ─── Environment Variables ───────────────────────────────────
env:
  FLASK_ENV: "production"
  LOG_LEVEL: "INFO"

# ─── Node Selector ───────────────────────────────────────────
nodeSelector: {}

# ─── Tolerations ─────────────────────────────────────────────
tolerations: []

# ─── Affinity ────────────────────────────────────────────────
affinity: {}

# ─── Pod Disruption Budget ───────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1
