# ╔══════════════════════════════════════════════════════════════╗
# ║  CD Pipeline — Continuous Deployment                        ║
# ║  Build → Push to ECR → Deploy to EKS                       ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝

name: "🚀 CD Pipeline"

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: flask-eks-devops
  EKS_CLUSTER_NAME: flask-eks

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: Build & Push to ECR
  # ═══════════════════════════════════════════════════════════════
  build-and-push:
    name: "📦 Build & Push Docker Image"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

  # ═══════════════════════════════════════════════════════════════
  # Job 2: Deploy to Dev
  # ═══════════════════════════════════════════════════════════════
  deploy-dev:
    name: "🟢 Deploy to Dev"
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-dev --region ${{ env.AWS_REGION }}

      - name: Deploy with Kustomize
        run: |
          kubectl apply -k k8s/overlays/dev/
          kubectl rollout status deployment/dev-flask-eks-app -n flask-app-dev --timeout=300s

      - name: Smoke test
        run: |
          sleep 10
          kubectl run smoke-test --image=curlimages/curl --restart=Never --rm -i \
            -- curl -sf http://dev-flask-eks-app.flask-app-dev.svc/health || exit 1

  # ═══════════════════════════════════════════════════════════════
  # Job 3: Deploy to Staging (requires manual approval)
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: "🟡 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-staging --region ${{ env.AWS_REGION }}

      - name: Deploy with Kustomize
        run: |
          kubectl apply -k k8s/overlays/staging/
          kubectl rollout status deployment/staging-flask-eks-app -n flask-app-staging --timeout=300s

  # ═══════════════════════════════════════════════════════════════
  # Job 4: Deploy to Production (requires manual approval)
  # ═══════════════════════════════════════════════════════════════
  deploy-prod:
    name: "🔴 Deploy to Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-prod --region ${{ env.AWS_REGION }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install flask-app ./helm/flask-app \
            -f helm/flask-app/values-prod.yaml \
            --namespace flask-app-prod \
            --create-namespace \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods -n flask-app-prod
          kubectl get svc -n flask-app-prod
          kubectl get ingress -n flask-app-prod
