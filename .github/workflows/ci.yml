# ╔══════════════════════════════════════════════════════════════╗
# ║  CI Pipeline — Continuous Integration                       ║
# ║  Lint, Test, Security Scan, Build Verification              ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝

name: "🔍 CI Pipeline"

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  DOCKER_BUILDKIT: 1

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Job 1: Code Quality & Linting
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: "🧹 Lint & Format Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 linter
        run: flake8 app/ --max-line-length=100 --statistics

      - name: Check code formatting (black)
        run: black --check --line-length=100 app/

  # ═══════════════════════════════════════════════════════════════
  # Job 2: Unit Tests
  # ═══════════════════════════════════════════════════════════════
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest app/tests/ -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ═══════════════════════════════════════════════════════════════
  # Job 3: Security Scanning
  # ═══════════════════════════════════════════════════════════════
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"  # Don't fail build, just report
          severity: "CRITICAL,HIGH"

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          failure-threshold: warning

  # ═══════════════════════════════════════════════════════════════
  # Job 4: Docker Build Verification
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    name: "🐳 Docker Build Test"
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: flask-eks-app:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "flask-eks-app:ci-test"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ═══════════════════════════════════════════════════════════════
  # Job 5: Terraform Validation
  # ═══════════════════════════════════════════════════════════════
  terraform-validate:
    name: "🏗️ Terraform Validate"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
