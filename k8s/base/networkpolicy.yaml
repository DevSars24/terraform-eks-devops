# ╔══════════════════════════════════════════════════════════════╗
# ║  Network Policy                                             ║
# ║  Controls pod-to-pod traffic (zero-trust networking)        ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flask-eks-app
  namespace: flask-app
  labels:
    app.kubernetes.io/name: flask-eks-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: flask-eks-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
    # Allow traffic from within the same namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5000
    # Allow Prometheus scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5000
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS outbound (for AWS APIs, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
