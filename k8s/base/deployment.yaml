# ╔══════════════════════════════════════════════════════════════╗
# ║  Deployment                                                 ║
# ║  Production-grade deployment with probes, resources,        ║
# ║  anti-affinity, and security context                        ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-eks-app
  namespace: flask-app
  labels:
    app.kubernetes.io/name: flask-eks-app
    app.kubernetes.io/version: "2.0.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero-downtime deployment
  selector:
    matchLabels:
      app.kubernetes.io/name: flask-eks-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flask-eks-app
        app.kubernetes.io/version: "2.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: flask-eks-app
      terminationGracePeriodSeconds: 30

      # ─── Security Context (Pod Level) ──────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ─── Anti-Affinity (spread across nodes) ───────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - flask-eks-app
                topologyKey: kubernetes.io/hostname

      containers:
        - name: flask-app
          image: flask-eks-app:latest  # Overridden per environment
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # ─── Environment Variables ─────────────────────────
          envFrom:
            - configMapRef:
                name: flask-eks-app-config

          # ─── Resource Limits ───────────────────────────────
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # ─── Container Security Context ────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # ─── Liveness Probe ────────────────────────────────
          # Checks if the app process is alive
          # Failure → Kubernetes restarts the container
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # ─── Readiness Probe ───────────────────────────────
          # Checks if the app is ready to accept traffic
          # Failure → Pod removed from Service endpoints
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # ─── Startup Probe ─────────────────────────────────
          # Protects slow-starting containers
          # Until success, liveness/readiness probes are disabled
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

          # ─── Volume Mounts ─────────────────────────────────
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
