# ╔══════════════════════════════════════════════════════════════╗
# ║  Horizontal Pod Autoscaler (HPA)                            ║
# ║  Auto-scales pods based on CPU/memory utilization           ║
# ║  Author: Saurabh Singh Rajput (@DevSars24)                ║
# ╚══════════════════════════════════════════════════════════════╝
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flask-eks-app
  namespace: flask-app
  labels:
    app.kubernetes.io/name: flask-eks-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flask-eks-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # ─── Scale based on CPU utilization ──────────────────────
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # ─── Scale based on Memory utilization ───────────────────
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
