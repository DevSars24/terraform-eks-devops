apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flask-app

commonLabels:
  app.kubernetes.io/part-of: flask-eks-devops
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml
