# Production Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flask-app-prod

resources:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: prod

patches:
  - target:
      kind: Deployment
      name: flask-eks-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  - target:
      kind: HorizontalPodAutoscaler
      name: flask-eks-app
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15

  - target:
      kind: ConfigMap
      name: flask-eks-app-config
    patch: |
      - op: replace
        path: /data/FLASK_ENV
        value: production
      - op: replace
        path: /data/LOG_LEVEL
        value: WARNING
