# Staging Environment Overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flask-app-staging

resources:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  - target:
      kind: Deployment
      name: flask-eks-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

  - target:
      kind: ConfigMap
      name: flask-eks-app-config
    patch: |
      - op: replace
        path: /data/FLASK_ENV
        value: staging
      - op: replace
        path: /data/LOG_LEVEL
        value: INFO
