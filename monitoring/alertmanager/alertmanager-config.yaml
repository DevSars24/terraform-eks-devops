global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "namespace"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      group_wait: 10s
    - match:
        severity: warning
      receiver: "default"

receivers:
  - name: "default"
    # Uncomment and configure for Slack notifications:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    #     channel: "#devops-alerts"
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ .CommonAnnotations.summary }}"

  - name: "critical-alerts"
    # Uncomment for email notifications:
    # email_configs:
    #   - to: "devops@example.com"
    #     from: "alertmanager@example.com"
    #     smarthost: "smtp.gmail.com:587"
    #     auth_username: "alertmanager@example.com"
    #     auth_password: "your-app-password"

# ─── Alert Rules ──────────────────────────────────────────────
# These are defined as PrometheusRule CRDs in Kubernetes
# Example alerts:
#
# - High error rate (>5% of requests returning 5xx)
# - High latency (p99 > 2s)
# - Pod restart loop (>3 restarts in 10min)
# - High CPU usage (>80% for 5min)
# - High memory usage (>85% for 5min)
